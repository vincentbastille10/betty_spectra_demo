<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Betty Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0b0f1e;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      width: 100vw;
      height: 100vh;
    }

    .chat {
      width: 100vw;
      height: 100vh;
      background: #111827;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .avatar-wrap img {
      width: 320px;
      height: 320px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 10px;
      padding-right: 4px;
    }

    .msg {
      margin: 8px 0;
      line-height: 1.4;
      font-size: 18px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .user {
      text-align: right;
      color: #ffffff;
    }

    .bot {
      text-align: left;
      color: #a78bfa;
    }

    .footer {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    button {
      padding: 10px 18px;
      border: none;
      background: #7b61ff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.95;
    }

    @media (max-width: 768px) {
      .chat {
        padding: 14px;
      }

      .avatar-wrap img {
        width: 220px;
        height: 220px;
      }

      .msg {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="chat">
    <div class="avatar-wrap">
      <img src="/static/neutre_femme.webp" alt="Betty" />
    </div>

    <div id="messages" class="messages"></div>

    <div class="footer">
      <input id="input" placeholder="Écrivez votre message..." />
      <button id="send">Envoyer</button>
    </div>
  </div>

  <script>
    async function send() {
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");

      const text = input.value.trim();
      if (!text) return;

      messages.innerHTML += `<div class="msg user">${text}</div>`;
      input.value = "";
      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        messages.innerHTML += `<div class="msg bot">${data.response}</div>`;
        messages.scrollTop = messages.scrollHeight;
      } catch (e) {
        messages.innerHTML += `<div class="msg bot">Petit souci technique…</div>`;
        messages.scrollTop = messages.scrollHeight;
      }
    }

    document.getElementById("send").addEventListener("click", send);

    document.getElementById("input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        send();
      }
    });
  </script>
</body>
</html>
