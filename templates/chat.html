<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Betty Demo</title>
  <style>
    body {
      background: #0b0f1e;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .chat {
      width: 400px;
      background: #111827;
      border-radius: 12px;
      padding: 20px;
    }

    .messages {
      height: 400px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .msg {
      margin: 8px 0;
    }

    .user { text-align: right; }
    .bot { text-align: left; color: #a78bfa; }

    .footer {
      display: flex;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border: none;
      background: #7b61ff;
      color: white;
      border-radius: 6px;
    }

    img {
      width: 80px;
      display: block;
      margin: 0 auto 10px;
      border-radius: 50%;
    }
  </style>
</head>

<body>
  <div class="chat">
    <img src="/static/neutre_femme.webp" />

    <div id="messages" class="messages"></div>

    <div class="footer">
      <input id="input" placeholder="Écrivez votre message..." />
      <button onclick="send()">Envoyer</button>
    </div>
  </div>

<script>
async function send() {
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");

  const text = input.value;
  if (!text) return;

  messages.innerHTML += `<div class="msg user">${text}</div>`;
  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: text})
  });

  const data = await res.json();

  messages.innerHTML += `<div class="msg bot">${data.response}</div>`;
  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
